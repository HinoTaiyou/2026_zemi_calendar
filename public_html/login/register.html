<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新規登録 | Calm Focus Calendar</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <main class="page">
      <section class="auth-panel auth-panel--narrow">
        <span class="auth-eyebrow" style="background:rgba(20,184,166,0.12);color:var(--color-teal-strong);border:1px solid rgba(20,184,166,0.18)">Create Account</span>
        <h2>アカウント新規作成</h2>
        <p>登録したニックネームとパスワードは、このブラウザのデータベースに保存されます。</p>

        <form id="registerForm" class="auth-form" autocomplete="on">
          <div class="auth-field">
            <label class="form-label" for="newNickname">ニックネーム</label>
            <input class="form-input" id="newNickname" name="nickname" type="text" required maxlength="24" />
          </div>
          <div class="auth-field">
            <label class="form-label" for="newPassword">パスワード</label>
            <input class="form-input" id="newPassword" name="password" type="password" required minlength="4" />
          </div>

          <div id="registerMessage" class="auth-message" aria-live="polite"></div>

          <div class="auth-actions">
            <button class="primary-btn" type="submit">登録する</button>
            <a class="secondary-btn" href="index.html">ログイン画面に戻る</a>
          </div>
        </form>
      </section>
    </main>

    <script src="auth.js"></script>
    <script>
      const form = document.getElementById("registerForm");
      const message = document.getElementById("registerMessage");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const formData = new FormData(form);
        const nickname = String(formData.get("nickname") || "").trim();
        const password = String(formData.get("password") || "");

        try {
          await registerAccount(nickname, password);
          setMessage(message, "登録が完了しました。ログイン画面へ移動します。", "success");
          setTimeout(() => {
            window.location.href = "index.html";
          }, 700);
        } catch (error) {
          setMessage(message, error.message, "error");
        }
      });
    </script>
  </body>
</html>
